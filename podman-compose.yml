version: '3.8'

services:
  dashboard:
    build: .
    container_name: observatorio_dashboard
    ports:
      - "8501:8501"
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - MINIO_ENDPOINT=minio:9000
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - observatorio_net

  api:
    build: .
    container_name: observatorio_api
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    restart: unless-stopped
    networks:
      - observatorio_net

networks:
  observatorio_net:
    driver: bridge
